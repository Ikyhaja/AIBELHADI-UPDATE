<!DOCTYPE html>
<html>
<head>
<title>Login Keren</title>

<style>

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#4facfe,#00f2fe);
font-family:Arial;
}

.login-box{
background:rgba(255,255,255,0.2);
backdrop-filter:blur(10px);
padding:40px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
text-align:center;
width:300px;
animation:fade 1s;
}

@keyframes fade{
from{opacity:0; transform:translateY(-20px);}
to{opacity:1;}
}

input{
width:100%;
padding:10px;
margin:10px 0;
border:none;
border-radius:8px;
}

button{
width:100%;
padding:10px;
border:none;
background:#007BFF;
color:white;
border-radius:8px;
cursor:pointer;
font-size:16px;
}

button:hover{
background:#0056b3;
}

</style>

</head>

<body>

<div class="login-box">

<h2>Login</h2>

<input type="text" id="username" placeholder="Username">

<input type="password" id="password" placeholder="Password">

<button onclick="login()">Masuk</button>

<p id="error" style="color:red;"></p>

</div>

<script>

function login(){

let user=document.getElementById("username").value;
let pass=document.getElementById("password").value;

if(user=="admin" && pass=="12345"){

window.location="loading.html";

}else{

document.getElementById("error").innerHTML="Login salah!";

}

}

</script>

</body>
</html>
