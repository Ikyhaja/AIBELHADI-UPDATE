<!DOCTYPE html>
<html>
<head>
  <title>AIBEL_H4D1 by ikyy s</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      text-align: center;
    }

    /* layar loading */
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: black;
      color: white;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 24px;
      z-index: 999;
    }

    /* animasi titik */
    .dots::after {
      content: "";
      animation: titik 1s infinite;
    }

    @keyframes titik {
      0% { content: ""; }
      33% { content: "."; }
      66% { content: ".."; }
      100% { content: "..."; }
    }

    /* isi website */
    .content {
      padding: 40px;
    }
  </style>
</head>

<body>

  <!-- loading -->
  <div id="loading">
    Loading<span class="dots"></span>
  </div>

  <!-- isi -->
  <div class="content">
 <h1>WELCOME TO AIB EL_HADI</h1>
    <p>BUATAN IKY</p>
    <p>DISURUH LATIF HADI SEBAGAI KETUA GENK</p>
    <img src="latif.jpeg" alt="Gambar Latif">
    <p>ini adalah ketua kita EL_H4D1 LATHIF HADI</p>
    <img src="madan.jpeg" alt="madan pacaran" width="350">
    <img src="spakbor.jpeg" alt="Gambar spakbor" width="400">
    <img src="nopal.jpeg" alt="Gambar nopal" width="350">
    <audio controls>
        <source src="nyanyi.ogg" type="audio/ogg">
        Your browser does not support the audio element.
    </audio>
    <p>BERELAAN!</p>
  </div>

  <script>
    // hilangkan loading setelah 2 detik
    setTimeout(function() {
      document.getElementById("loading").style.display = "none";
    }, 2000);
  </script>

</body>
</html>
